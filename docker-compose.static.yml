name: origem-static

x-web-common: &web-common
  image: ${WEB_IMAGE:-origem-web:local}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    NODE_ENV: ${NODE_ENV:-production}
    PORT: 3000
  networks:
    - origem_static
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 10s

services:
  web-a:
    <<: *web-common
    container_name: origem-static-web-a
    ports:
      - "127.0.0.1:${WEB_A_PORT:-3001}:3000"

  web-b:
    <<: *web-common
    container_name: origem-static-web-b
    ports:
      - "127.0.0.1:${WEB_B_PORT:-3002}:3000"

networks:
  origem_static:
    driver: bridge
