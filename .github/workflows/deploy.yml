name: Build e Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  VPS_HOST: 147.15.31.73
  DEPLOY_PATH: /var/www/Origem

jobs:
  build:
    name: Construir imagem
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar nome da imagem
        id: image
        run: |
          repository="$(printf '%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${repository}/web" >> "$GITHUB_OUTPUT"

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest

  deploy:
    name: Publicar na VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/origem_deploy_key
          chmod 600 ~/.ssh/origem_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy remoto
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          WEB_IMAGE: ${{ needs.build.outputs.image }}:${{ github.sha }}
        run: |
          ssh -i ~/.ssh/origem_deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' WEB_IMAGE='$WEB_IMAGE' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' bash -se" <<'EOF'
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Arquivo .env não encontrado em $DEPLOY_PATH. Crie a partir de .env.example antes do primeiro deploy." >&2
            exit 1
          fi

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          printf 'WEB_IMAGE=%s\n' "$WEB_IMAGE" > .env.deploy

          cat > docker-compose.yml <<'COMPOSE'
          name: origem-static

          x-web-common: &web-common
            image: ${WEB_IMAGE}
            restart: unless-stopped
            environment:
              NODE_ENV: ${NODE_ENV:-production}
              PORT: 3000
            networks:
              - origem_static
            healthcheck:
              test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
              interval: 15s
              timeout: 5s
              retries: 5
              start_period: 10s

          services:
            web-a:
              <<: *web-common
              container_name: origem-web-1
              ports:
                - "127.0.0.1:${WEB_A_PORT:-3001}:3000"

            web-b:
              <<: *web-common
              container_name: origem-web-2
              ports:
                - "127.0.0.1:${WEB_B_PORT:-3002}:3000"

          networks:
            origem_static:
              driver: bridge
          COMPOSE

          docker compose --env-file .env --env-file .env.deploy pull web-a web-b
          docker compose --env-file .env --env-file .env.deploy up -d --remove-orphans
          docker image prune -f
          EOF
