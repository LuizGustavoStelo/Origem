name: Build e Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  VPS_HOST: 147.15.31.73
  DEPLOY_PATH: /var/www/Origem

jobs:
  build:
    name: Construir imagem
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar nome da imagem
        id: image
        run: |
          repository="$(printf '%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${repository}/web" >> "$GITHUB_OUTPUT"

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest

  deploy:
    name: Publicar na VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/origem_deploy_key
          chmod 600 ~/.ssh/origem_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy remoto
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          WEB_IMAGE: ${{ needs.build.outputs.image }}:${{ github.sha }}
          REPOSITORY_URL: https://github.com/${{ github.repository }}.git
        run: |
          ssh -i ~/.ssh/origem_deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' WEB_IMAGE='$WEB_IMAGE' REPOSITORY_URL='$REPOSITORY_URL' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' bash -se" <<'EOF'
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ ! -d .git ]; then
            git clone "$REPOSITORY_URL" .
          fi

          git fetch origin main
          git reset --hard origin/main

          if [ ! -f .env ]; then
            echo "Arquivo .env não encontrado em $DEPLOY_PATH. Crie a partir de .env.example antes do primeiro deploy." >&2
            exit 1
          fi

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          printf 'WEB_IMAGE=%s\n' "$WEB_IMAGE" > .env.deploy

          docker compose --env-file .env --env-file .env.deploy -f docker-compose.static.yml pull web-a web-b
          docker compose --env-file .env --env-file .env.deploy -f docker-compose.static.yml up -d --remove-orphans
          docker image prune -f
          EOF
