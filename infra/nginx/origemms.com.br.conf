# Nginx instalado diretamente na VPS.
# Copie este arquivo para /etc/nginx/sites-available/origemms.com.br e crie o link em sites-enabled.

upstream origem_web {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

limit_req_zone $binary_remote_addr zone=origem_public:20m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name origemms.com.br www.origemms.com.br;

    # Para os próximos domínios estaduais, adicione aqui:
    # server_name origemms.com.br www.origemms.com.br origemrj.com.br origemrs.com.br origemmt.com.br;

    client_max_body_size 20m;

    location / {
        limit_req zone=origem_public burst=60 nodelay;

        proxy_pass http://origem_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
