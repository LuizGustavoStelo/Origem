name: origem

x-web-common: &web-common
  image: ${WEB_IMAGE:-origem-web:local}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    NODE_ENV: ${NODE_ENV:-production}
    PORT: 3000
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - origem_internal
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 10s

services:
  web-a:
    <<: *web-common
    container_name: origem-web-a
    ports:
      - "127.0.0.1:${WEB_A_PORT:-3001}:3000"

  web-b:
    <<: *web-common
    container_name: origem-web-b
    ports:
      - "127.0.0.1:${WEB_B_PORT:-3002}:3000"

  postgres:
    image: postgres:16-alpine
    container_name: origem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - origem_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: origem-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - origem_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  origem_internal:
    driver: bridge
